<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parcours — JPO Albert Camus</title>
<link rel="stylesheet" href="style-global.css">
<style>
.stop-card {
  background: white; border-radius: 20px; padding: 20px;
  width: 100%; max-width: 640px;
  display: flex; align-items: center; gap: 16px;
  box-shadow: 0 4px 20px var(--shadow); margin-bottom: 12px;
  transition: transform .2s; text-decoration: none; color: inherit;
  border-left: 6px solid transparent;
  animation: fadeUp .5s ease both;
}
.stop-card:hover { transform: translateX(5px); }
.stop-card.done  { opacity: .7; }

.stop-num {
  font-family: 'Baloo 2', cursive; font-size: 1.8rem; font-weight: 800;
  min-width: 40px; text-align: center; opacity: .25;
}
.stop-icon { font-size: 2.2rem; flex-shrink: 0; }
.stop-info { flex: 1; }
.stop-name { font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 800; color: var(--dark); margin-bottom: 3px; }
.stop-desc { font-size: .78rem; color: var(--muted); line-height: 1.4; }
.stop-status {
  font-size: .65rem; font-weight: 800; letter-spacing: 1px;
  text-transform: uppercase; padding: 4px 12px; border-radius: 20px;
  white-space: nowrap;
}
.s-todo { background: #f0f0ff; color: #7c7c9a; }
.s-done { background: #d1fae5; color: #065f46; }

.connector {
  width: 3px; height: 24px; margin-left: 38px;
  background: linear-gradient(#e2e2f0, #e2e2f0);
  border-radius: 2px;
}

/* score total */
.score-total {
  width: 100%; max-width: 640px;
  background: white; border-radius: 20px; padding: 20px 24px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 20px var(--shadow); margin-bottom: 16px;
}
.st-label { font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 1rem; color: var(--dark); }
.st-pts   { font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 1.6rem; color: #f59e0b; }

.btn-badge {
  display: block; width: 100%; max-width: 640px; padding: 18px;
  background: linear-gradient(135deg, #f59e0b, #f97316);
  border: none; border-radius: 16px; color: white;
  font-family: 'Baloo 2', cursive; font-size: 1.05rem; font-weight: 800;
  cursor: pointer; text-decoration: none; text-align: center;
  transition: all .25s; box-shadow: 0 4px 20px rgba(245,158,11,.4);
  margin-bottom: 12px;
}
.btn-badge:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(245,158,11,.5); }
.btn-badge.locked { opacity: .35; pointer-events: none; }
</style>
</head>
<body>
<div class="page-wrapper">
<div style="width:100%;max-width:640px">

  <p class="section-label fade-up" style="font-family:'Nunito',sans-serif;font-size:.65rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px">// votre parcours</p>
  <h1 class="fade-up d1" style="font-family:'Baloo 2',cursive;font-size:clamp(1.6rem,4vw,2.2rem);font-weight:800;color:var(--dark);margin-bottom:6px">Plan de visite 🗺️</h1>
  <p class="fade-up d2" style="font-size:.88rem;color:var(--muted);margin-bottom:24px">Scanne le QR code dans chaque salle pour jouer !</p>

  <div class="score-total fade-up d2">
    <div class="st-label">⭐ Score total</div>
    <div class="st-pts" id="total-pts">0 pts</div>
  </div>

  <div id="stops-list"></div>

  <a href="badge.html" class="btn-badge locked fade-up" id="btn-badge">
    🏆 Voir mon badge !
  </a>
  <a href="index.html" class="btn-back fade-up">← Retour à l'accueil</a>

</div>
</div>

<script src="script.js"></script>
<script>
buildNav();

const STOPS = [
  { id:'cdi',  num:'01', icon:'📚', name:'CDI',              desc:'Langues vivantes, Latin, Théâtre, Section Européenne',  color:'var(--cdi)',  light:'var(--cdi-light)',  file:'quiz-cdi.html'   },
  { id:'sci',  num:'02', icon:'🔬', name:'Salle de Sciences', desc:'Maths, SPC, SVT, NSI, spécialités scientifiques',       color:'var(--sci)',  light:'var(--sci-light)',  file:'quiz-sciences.html'},
  { id:'stmg', num:'03', icon:'💼', name:'Pôle ST2S / STMG',  desc:'BTS MCO, BTS SP3S, Bac Pro ASSP, CAP Cuisine...',      color:'var(--stmg)', light:'var(--stmg-light)', file:'quiz-stmg.html'  },
  { id:'gym',  num:'04', icon:'🏃', name:'Gymnase',           desc:'Section Sport/Basket, Cordées de la réussite, Internat',color:'var(--gym)',  light:'var(--gym-light)',  file:'quiz-gymnase.html'},
];

function render() {
  const s = getScore();
  const total = totalScore();
  document.getElementById('total-pts').textContent = total + ' pts';

  let html = '';
  STOPS.forEach((st, i) => {
    const done = s[st.id] !== undefined;
    html += `
      <a href="${st.file}" class="stop-card ${done?'done':''}" style="border-left-color:${st.color}">
        <div class="stop-num" style="color:${st.color}">${st.num}</div>
        <div class="stop-icon">${st.icon}</div>
        <div class="stop-info">
          <div class="stop-name">${st.name}</div>
          <div class="stop-desc">${st.desc}</div>
        </div>
        <span class="stop-status ${done?'s-done':'s-todo'}">${done ? '✓ ' + s[st.id] + ' pts' : 'À visiter'}</span>
      </a>
      ${i < STOPS.length-1 ? '<div class="connector"></div>' : ''}
    `;
  });
  document.getElementById('stops-list').innerHTML = html;

  const btn = document.getElementById('btn-badge');
  if (Object.keys(s).length >= 4) btn.classList.remove('locked');
}
render();
</script>
</body>
</html>
